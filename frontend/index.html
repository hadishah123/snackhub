<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff6b35" />

    <!-- SEO Meta -->
    <title>SnackHub | Fresh Snacks Delivered Fast</title>
    <meta 
      name="description" 
      content="SnackHub is your go-to platform for ordering delicious snacks online. Fast delivery, great taste, and easy ordering." 
    />
    <meta 
      name="keywords" 
      content="SnackHub, food delivery, snacks, online food ordering, fast delivery, street food"
    />
    <meta name="author" content="SnackHub" />

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="SnackHub | Order Snacks Online" />
    <meta property="og:description" content="Order your favorite snacks online with SnackHub. Fresh, fast, and delicious." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./snackhub-preview.png" />
    <meta property="og:url" content="https://snackhub-nagpur.vercel.app/" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts Example (Optional) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run SnackHub.
    </noscript>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Main React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
